<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page introuvable</title>
<link rel="icon" type="image/png" href="./logos/uranus-film.png">
<link rel="stylesheet" href="style.css">
<style>
    .page-404 {
        min-height: 100vh;
        background: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
        font-family: "Courier New", monospace;
    }

    .error-ascii {
        font-family: "Courier New", monospace;
        white-space: pre;
        background: linear-gradient(to bottom, #3a0ca3, #9d4edd, #3a0ca3);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: clamp(6px, 2vw, 18px);
        line-height: 1.25;
        margin-bottom: 48px;
    }

    .error-msg {
        font-size: 0.85rem;
        color: #444;
        line-height: 1.8;
        max-width: 420px;
        margin-bottom: 40px;
    }

    .error-msg strong {
        color: #000;
    }

    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        font-family: "Courier New", monospace;
        font-size: 0.82rem;
        font-weight: bold;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 14px 32px;
        border-radius: 2px;
        background: #000;
        color: #fff;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .back-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    }

    .logo-404 {
        margin-bottom: 48px;
    }
    .logo-404 img {
        width: 100px;
        opacity: 0.7;
    }
</style>
</head>

<body>
<div class="page-404">

    <div class="logo-404">
        <a href="index.html"><img src="./logos/uranus-film.png" alt="Uranus Film"></a>
    </div>

    <pre id="err-ascii" class="error-ascii"></pre>

    <p class="error-msg">
        <strong>Cette page n'existe pas.</strong><br>
        La terre que vous cherchez s'est dérobée sous vos pieds.<br>
        Revenez au point de départ.
    </p>

    <a href="index.html" class="back-btn">
        ← Retour à l'accueil
    </a>

</div>

<script>
(function () {
    var ARTS = [
        [
            " __ _  ___  _____   ___ ___  _   _ _  _ ___  ",
            "/ /| |/ _ \\|_  / | | __/ _ \\| | | | \\| |   \\ ",
            "/ _ \\ | (_) |/ /| |_| _| (_) | |_| | .` | |) |",
            "\\___/_|\\___//___\\___/_|  \\___/ \\___/|_|\\_|___/ "
        ],
        [
            "##  ##  ####  ##  ##     ####### ####  ##  ## ##  ## ####  ",
            "##  ## ##  ## ##  ##     ##     ##  ## ##  ## ###  ## ##  ##",
            "##  ## ##  ## ##  ##     ####   ##  ## ##  ## ## ### ## ##  ",
            " ####  ##  ## ##  ##     ##     ##  ## ##  ## ##  ### ##  ##",
            "  ##    ####  ##  ###### ##      ####   ####  ##  ##  ####  "
        ],
        [
            " __   __ _  ____    ____  ____  _  _  __ _  ____  ", 
            "(  ) (  ( \\(_  _)  (  __)/  _ \\/ )( \\(  ( \\(    \\ ",
            " )(__ /    /  )(    ) _) ) O ( \\ /\\ //    / ) D ( ",
            "(____)\\_)__) (__)  (__)  \\___/ (_/\\_)\\_)__)(____/ "
        ]
    ];

    var el = document.getElementById('err-ascii');
    var art = ARTS[Math.floor(Math.random() * ARTS.length)];
    el.textContent = art.join('\n');

    function fit() {
        var w = el.parentElement.clientWidth;
        var longest = Math.max.apply(null, art.map(function(l){ return l.length; }));
        if (!longest || !w) return;
        var px = w / (longest * 0.601);
        el.style.fontSize = Math.min(18, Math.max(5, px)) + 'px';
    }

    fit();
    window.addEventListener('resize', fit);
})();
</script>

</body>
</html>
